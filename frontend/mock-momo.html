<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán MoMo (Giả lập)</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --momo-color: #a50064;
            --momo-gradient: linear-gradient(135deg, #a50064, #d82d8b);
            --bg-color: #f3f4f6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .momo-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }

        .header {
            background: var(--momo-gradient);
            padding: 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .content {
            padding: 30px;
        }

        .order-info {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px dashed #e5e7eb;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .info-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
            font-weight: bold;
            font-size: 18px;
            color: var(--momo-color);
        }

        .label {
            color: #6b7280;
        }

        .value {
            color: #1f2937;
            font-weight: 500;
        }

        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: var(--momo-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-confirm:hover {
            background: #8b0054;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(165, 0, 100, 0.3);
        }

        .alert-test {
            background: #fef2f2;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: var(--momo-color);
        }
    </style>
</head>
<body>

    <div class="momo-container">
        <div class="header">
            <h1><i class="fa-solid fa-wallet"></i> Cổng Thanh Toán MoMo</h1>
        </div>
        <div class="content">
            <div class="alert-test">
                <i class="fa-solid fa-triangle-exclamation"></i> Đây là môi trường GIẢ LẬP (Mock) dành cho Demo.
            </div>

            <div class="order-info">
                <div class="info-row">
                    <span class="label">Mã đơn hàng:</span>
                    <span class="value" id="display-order-id">Đang tải...</span>
                </div>
                <div class="info-row">
                    <span class="label">Nhà cung cấp:</span>
                    <span class="value">SmartFoodAI</span>
                </div>
                <div class="info-row">
                    <span class="label">Tổng tiền:</span>
                    <span class="value" id="display-amount">0đ</span>
                </div>
            </div>

            <button class="btn-confirm" id="btn-confirm" onclick="confirmPayment()">
                <i class="fa-solid fa-check-circle"></i> Xác nhận thanh toán
            </button>

            <div class="loader" id="loader">
                <i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý giao dịch...
            </div>
        </div>
    </div>

    <script>
        // Lấy query params
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId') || 'UNKNOWN';
        const amount = urlParams.get('amount') || '50000';

        // Hiển thị thông tin
        document.getElementById('display-order-id').innerText = orderId;
        document.getElementById('display-amount').innerText = new Intl.NumberFormat('vi-VN').format(amount) + 'đ';

        function confirmPayment() {
            const btn = document.getElementById('btn-confirm');
            const loader = document.getElementById('loader');

            btn.style.display = 'none';
            loader.style.display = 'block';

            // Chờ 1.5s để tạo hiệu ứng xử lý chân thực
            setTimeout(() => {
                // Chuyển hướng thẳng về trang return với resultCode=0 (thành công)
                const returnUrl = `/api/payment/momo/return?orderId=${orderId}&resultCode=0&transId=MOCK_APP_${orderId}`;
                window.location.href = returnUrl;
            }, 1500);
        }
    </script>
</body>
</html>
